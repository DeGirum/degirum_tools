name: Tests
run-name: Tests ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    strategy:
      fail-fast: false
      matrix:
        python: [3.9, 3.13]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            setup.py

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-gi python3-gi-cairo gir1.2-gtk-3.0 libgirepository1.0-dev build-essential python3-pip python3-gst-1.0 gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 python3-tk
          test/install-mediamtx.sh
          shell: bash

      - name: Install MediaMTX (Windows)
        if: runner.os == 'Windows'
        run: test\install-mediamtx.bat
        shell: cmd

      - name: Install Python dependencies
        run: python -m pip install -e '.[linting,testing,notifications]'

      - name: Run flake8
        run: python -m flake8 .

      - name: Run mypy
        run: python -m mypy

      - name: Run pytest (with coverage)
        run: python -m coverage run -m pytest -sv test/ --token=${{ secrets.CS_TOKEN }}
        env:
          S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}

      - name: Display coverage report
        run: python -m coverage report --omit=config*
